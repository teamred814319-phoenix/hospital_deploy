<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Doctor OTP Verification - PHOENIX
</title>

<link rel="stylesheet"
href="../css/style.css">

</head>

<body>

<div class="orb orb-pink"></div>
<div class="orb orb-blue"></div>
<div class="orb orb-green"></div>

<div class="landing-container">

<div class="glass-card form-card">

<h1 class="logo small-logo">
PHOENIX
</h1>

<p class="subtitle">
Email Verification
</p>

<br>

<p style="color: rgba(255,255,255,0.7); margin-bottom: 20px;">
We've sent a verification code to your registered email. Please enter it below to complete your registration.
</p>

<input
  type="email"
  id="doctorEmail"
  class="glass-input"
  placeholder="Your Email"
  readonly
  style="opacity: 0.7; margin-bottom: 20px;">

<br>

<button
type="button"
id="sendOtpBtn"
class="btn doctor-btn">

Send OTP

</button>

<br><br>

<input
type="text"
id="otp"
class="glass-input"
placeholder="Enter 6-digit OTP"
maxlength="6"
pattern="[0-9]{6}"
required>

<br><br>

<button
type="button"
id="verifyOtpBtn"
class="btn doctor-btn">

Verify OTP

</button>

<br><br>

<p style="color: rgba(255,255,255,0.6);">
Haven't received the OTP? Check your spam folder or
<a href="#" onclick="document.getElementById('sendOtpBtn').click(); return false;">
click here to resend
</a>
</p>

</div>

</div>

<script src="../js/config.js"></script>
<script src="../js/doctor.js"></script>

</body>

</html>
