<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>PHOENIX Admin Dashboard</title>

    <link rel="stylesheet" href="../css/style.css">

</head>

<body>

<div class="orb orb-pink"></div>
<div class="orb orb-blue"></div>
<div class="orb orb-green"></div>

<div class="dashboard-container">

    <div class="dashboard-header">

        <h1>
            PHOENIX ADMIN
        </h1>

        <button
            type="button"
            id="adminLogoutBtn"
            class="btn doctor-btn">

            Logout

        </button>

    </div>

    <!-- STATS -->

    <div class="dashboard-grid">

        <div class="dashboard-card stat-pink">

            <h3>Total Doctors</h3>

            <h1 id="totalDoctors">
                0
            </h1>

        </div>

        <div class="dashboard-card stat-blue">

            <h3>Total Patients</h3>

            <h1 id="totalPatients">
                0
            </h1>

        </div>

        <div class="dashboard-card stat-green">

            <h3>Total Appointments</h3>

            <h1 id="totalAppointments">
                0
            </h1>

        </div>

        <div class="dashboard-card stat-pink">

            <h3>Pending Doctors</h3>

            <h1 id="pendingDoctors">
                0
            </h1>

        </div>

        <div class="dashboard-card stat-green">

            <h3>Approved Doctors</h3>

            <h1 id="approvedDoctors">
                0
            </h1>

        </div>

    </div>

    <!-- ADD DOCTOR -->

    <div class="dashboard-card">

        <h2>Add Doctor</h2>

        <br>

        <form id="doctorForm">

            <label class="upload-label">Doctor Name</label>

            <input
                type="text"
                id="doctorName"
                class="glass-input"
                placeholder="Enter doctor name"
                required>

            <br>

            <label class="upload-label">Specialization</label>

            <input
                type="text"
                id="specialization"
                class="glass-input"
                placeholder="e.g., Cardiology"
                required>

            <br>

            <label class="upload-label">Experience (Years)</label>

            <input
                type="number"
                id="experience"
                class="glass-input"
                placeholder="0"
                required>

            <br>

            <label class="upload-label">Consultation Fee (₹)</label>

            <input
                type="number"
                id="consultationFee"
                class="glass-input"
                placeholder="500"
                required>

            <br>

            <label class="upload-label">Available Time</label>

            <input
                type="text"
                id="availableTime"
                class="glass-input"
                placeholder="10 AM - 2 PM"
                required>

            <br><br>

            <button
                class="btn doctor-btn"
                type="submit">

                Add Doctor

            </button>

        </form>

    </div>

    <!-- DOCTORS LIST -->

    <div class="dashboard-card">

        <h2>
            All Doctors
        </h2>

        <br>

        <label class="upload-label">Search Doctors</label>

        <input
            type="text"
            id="doctorSearch"
            class="glass-input"
            placeholder="Search by name, specialization, or hospital">

        <br><br>

        <div id="doctorList">
            Loading doctors...
        </div>

    </div>

</div>

<script src="../js/config.js"></script>
<script src="../js/admin.js"></script>

</body>

</html>
